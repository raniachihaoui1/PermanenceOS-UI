<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout Viewer</title>
  <style>
    :root {
      --bg: #071a1a;
      --panel: rgba(7, 40, 40, 0.92);
      --panel-strong: rgba(4, 20, 20, 0.97);
      --line: rgba(42, 192, 192, 0.18);
      --text: #c8eeed;
      --muted: #6ab8b8;
      --accent: #2ac0c0;
      --accent-2: #1ae8b0;
      --warn: #ffcc66;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    }

    :root.light {
      --bg: #f5f7fa;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: rgba(245, 247, 252, 0.98);
      --line: rgba(0, 0, 0, 0.10);
      --text: #1a2540;
      --muted: #4a6080;
      --accent: #2a6ad9;
      --accent-2: #1a9a70;
      --warn: #b07010;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(42, 192, 192, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(26, 232, 176, 0.07), transparent 25%),
        linear-gradient(180deg, #071a1a 0%, #0a2424 100%);
      color: var(--text);
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    html.light body {
      background: linear-gradient(180deg, #f5f7fa 0%, #eaf0fa 100%);
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #viewport {
      position: absolute;
      inset: 0;
    }

    .hud {
      position: absolute;
      z-index: 10;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      border-radius: 18px;
    }

    .legend {
      left: 16px;
      bottom: 16px;
      padding: 14px 16px;
      max-width: 420px;
    }

    .legend h2 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .legend-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-right: 8px;
      vertical-align: middle;
    }

    @media (max-width: 720px) {
      .legend {
        max-width: calc(100vw - 32px);
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div id="viewport"></div>

    <div class="hud legend" id="legend">
      <h2>Legend</h2>
      <div class="legend-grid" id="legend-grid">
        <div><span class="dot" style="background:#7cb2ff"></span>Rooms</div>
        <div><span class="dot" style="background:#9b7cff"></span>Furniture / MEP</div>
        <div><span class="dot" style="background:#3a70e0"></span>Columns</div>
        <div><span class="dot" style="background:#ffd36a"></span>Beams / Walls</div>
        <div><span class="dot" style="background:#ff8a7a"></span>Doors</div>
        <div><span class="dot" style="background:#8ad4ff"></span>Windows</div>
      </div>
    </div>
    <!-- Element click popup -->
    <div id="el-popup" style="
      display:none;position:absolute;z-index:30;
      background:rgba(7,40,40,0.97);
      border:1px solid #1a5555;border-radius:12px;
      padding:14px 16px;min-width:190px;max-width:250px;
      color:#c8eeed;font-family:'Segoe UI',sans-serif;font-size:13px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6);backdrop-filter:blur(16px);
    ">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span id="el-popup-id" style="font-size:15px;font-weight:700;color:#2ac0c0"></span>
        <button id="el-popup-close" style="background:none;border:none;color:#6ab8b8;font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>
      </div>
      <div id="el-popup-type" style="color:#6ab8b8;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px"></div>
      <div id="el-popup-props" style="font-size:12px;color:#a0d8d8;line-height:1.8"></div>
      <button id="el-popup-select" style="
        margin-top:10px;width:100%;padding:6px 0;
        background:#0d3030;border:1px solid #2ac0c0;border-radius:6px;
        color:#2ac0c0;font-size:12px;cursor:pointer;font-weight:600;
        letter-spacing:.3px;
      ">Select in App ↗</button>
    </div>

    <script>
      // Inject compare legend items if needed (runs before module script)
      (function () {
        const p = new URLSearchParams(window.location.search);
        if (p.get("mode") === "compare") {
          const g = document.getElementById("legend-grid");
          g.innerHTML +=
            '<div><span class="dot" style="background:#22dd88"></span>Added</div>' +
            '<div><span class="dot" style="background:#ff3344"></span>Removed</div>';
          document.getElementById("legend").querySelector("h2").textContent = "Legend — Compare Mode";
        }
        if (p.get("highlight")) {
          const g = document.getElementById("legend-grid");
          g.innerHTML += '<div><span class="dot" style="background:#ff9900"></span>Selected</div>';
        }
      })();
    </script>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const DEFAULT_LAYOUT_URL = "./team_01_edited_layout.json";
    const BEFORE_LAYOUT_URL  = "./team_01_edited_layout_before.json";
    const viewport = document.getElementById("viewport");

    // URL params
    const _urlParams   = new URLSearchParams(window.location.search);
    const _isLight     = _urlParams.get("theme")     === "light";
    const _highlightId = _urlParams.get("highlight") || "";
    const _compareMode = _urlParams.get("mode")      === "compare";
    const _showLabels  = _urlParams.get("labels")    !== "0";
    const _optionFile  = _urlParams.get("optionFile") || "";
    if (_isLight) document.documentElement.classList.add("light");

    const _bgColor    = _isLight ? 0xf5f7fa : 0x071a1a;
    const _fogColor   = _isLight ? 0xeaf0fa : 0x071a1a;
    const _gridMain   = _isLight ? 0xc0cce0 : 0x1a5555;
    const _gridSub    = _isLight ? 0xd8e2f0 : 0x0d3030;
    const _sun2Color  = _isLight ? 0xffffff : 0x7cb2ff;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(_bgColor);
    scene.fog = new THREE.Fog(_fogColor, 40, 180);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(24, 22, 24);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    viewport.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(4.5, 0, 2.5);

    const ambient = new THREE.AmbientLight(0xffffff, _isLight ? 2.0 : 1.25);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, _isLight ? 1.8 : 2.2);
    sun.position.set(10, 20, 8);
    scene.add(sun);

    const sun2 = new THREE.DirectionalLight(_sun2Color, _isLight ? 0.4 : 0.75);
    sun2.position.set(-10, 10, -8);
    scene.add(sun2);

    const grid = new THREE.GridHelper(80, 80, _gridMain, _gridSub);
    grid.position.y = -0.02;
    scene.add(grid);

    const axisGroup = new THREE.Group();
    scene.add(axisGroup);

    let contentGroup = new THREE.Group();
    scene.add(contentGroup);

    const materials = {
      room:      new THREE.MeshStandardMaterial({ color: 0x7cb2ff, transparent: true, opacity: 0.40, roughness: 0.85, metalness: 0.05 }),
      furniture: new THREE.MeshStandardMaterial({ color: 0x9b7cff, transparent: true, opacity: 0.40, roughness: 0.75 }),
      mep:       new THREE.MeshStandardMaterial({ color: 0x8be7d3, transparent: true, opacity: 0.42, roughness: 0.75 }),
      column:    new THREE.MeshStandardMaterial({ color: 0x2255b8, roughness: 0.6,  metalness: 0.05 }),
      beam:      new THREE.MeshStandardMaterial({ color: 0xffd36a, roughness: 0.55, metalness: 0.1  }),
      wall:      new THREE.MeshStandardMaterial({ color: 0xf0b35f, roughness: 0.65, metalness: 0.0  }),
      door:      new THREE.MeshStandardMaterial({ color: 0xff8a7a, roughness: 0.7 }),
      window:    new THREE.MeshStandardMaterial({ color: 0x8ad4ff, roughness: 0.65 }),
      outline:   new THREE.LineBasicMaterial({ color: _isLight ? 0x1a2540 : 0xffffff, transparent: true, opacity: 0.8 }),
      // Compare-mode overlay materials
      added:     new THREE.MeshStandardMaterial({ color: 0x22dd88, transparent: true, opacity: 0.85, roughness: 0.5, metalness: 0.1, emissive: 0x11aa55, emissiveIntensity: 0.3 }),
      removed:   new THREE.MeshStandardMaterial({ color: 0xff3344, transparent: true, opacity: 0.75, roughness: 0.5, metalness: 0.1, emissive: 0xcc1122, emissiveIntensity: 0.3 }),
      highlight: new THREE.MeshStandardMaterial({ color: 0xff9900, roughness: 0.4, metalness: 0.2, emissive: 0xff6600, emissiveIntensity: 0.45 }),
    };

    // Tracks meshes per element ID for highlight / compare
    const elementMeshes = {};

    function clearContent() {
      scene.remove(contentGroup);
      contentGroup = new THREE.Group();
      scene.add(contentGroup);
      Object.keys(elementMeshes).forEach((k) => delete elementMeshes[k]);
    }

    function _trackMesh(id, mesh) {
      if (!id) return;
      if (!elementMeshes[id]) elementMeshes[id] = [];
      elementMeshes[id].push(mesh);
    }

    function extractPoints(entity) {
      if (!Array.isArray(entity?.geometry)) return [];
      return entity.geometry
        .filter((pt) => Array.isArray(pt) && pt.length >= 2)
        .map((pt) => new THREE.Vector3(Number(pt[0]), 0, -Number(pt[1])));
    }

    function extractLine(entity) {
      const pts = extractPoints(entity);
      if (pts.length >= 2) return [pts[0], pts[pts.length - 1]];
      if (pts.length === 1) return [pts[0], pts[0].clone().add(new THREE.Vector3(0.001, 0, 0.001))];
      return null;
    }

    function closedPolygon(points) {
      if (!points.length) return [];
      const copy = points.map((p) => p.clone());
      const first = copy[0];
      const last = copy[copy.length - 1];
      if (!first.equals(last)) copy.push(first.clone());
      return copy;
    }

    function polygonArea(points) {
      if (points.length < 3) return 0;
      let sum = 0;
      for (let i = 0; i < points.length - 1; i++) {
        const a = points[i];
        const b = points[i + 1];
        sum += a.x * b.z - b.x * a.z;
      }
      return Math.abs(sum) / 2;
    }

    function makeShapeFromPoints(points) {
      const shape = new THREE.Shape();
      const first = points[0];
      shape.moveTo(first.x, first.z);
      for (let i = 1; i < points.length; i++) {
        shape.lineTo(points[i].x, points[i].z);
      }
      return shape;
    }

    function addExtrudedPolygon(points, height, material, y = 0) {
      const closed = closedPolygon(points);
      if (closed.length < 4) return null;
      const shape = makeShapeFromPoints(closed);
      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: height,
        bevelEnabled: false,
        steps: 1,
      });
      geometry.rotateX(-Math.PI / 2);
      geometry.translate(0, y, 0);
      const mesh = new THREE.Mesh(geometry, material);
      contentGroup.add(mesh);
      return mesh;
    }

    function addOutline(points, color = 0xffffff, y = 0.03) {
      const closed = closedPolygon(points);
      if (closed.length < 2) return;
      const geometry = new THREE.BufferGeometry().setFromPoints(closed.map((p) => new THREE.Vector3(p.x, y, p.z)));
      const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color }));
      contentGroup.add(line);
    }

    function addSegment(start, end, color, width = 0.08, height = 0.12, y = 0.04) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const length = dir.length();
      const angle = Math.atan2(dir.z, dir.x);
      const geometry = new THREE.BoxGeometry(length, height, width);
      const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color, roughness: 0.55 }));
      mesh.rotation.y = -angle;
      mesh.position.set((start.x + end.x) / 2, y + height / 2, (start.z + end.z) / 2);
      contentGroup.add(mesh);
      return mesh;
    }

    function parseDimensionPair(value, fallbackA, fallbackB) {
      const raw = String(value || "");
      const [aRaw, bRaw] = raw.split("x");
      const a = Math.max(0.01, (Number(aRaw) || fallbackA) / 1000);
      const b = Math.max(0.01, (Number(bRaw) || fallbackB) / 1000);
      return [a, b];
    }

    function addColumn(point, attrs = {}, id = null, matOverride = null) {
      const [width, depth] = parseDimensionPair(attrs.dimensions, 200, 200);
      const height = 2.8;
      const geometry = new THREE.BoxGeometry(width, height, depth);
      const mesh = new THREE.Mesh(geometry, matOverride || materials.column);
      mesh.userData.elementId = id || "";
      mesh.userData.elInfo = {
        type: "column",
        dimensions: attrs.dimensions || `${Math.round(width*1000)}×${Math.round(depth*1000)} mm`,
        material: attrs.material || "—",
        height: attrs.height ? `${attrs.height} m` : "2.8 m",
      };
      mesh.position.set(point.x, height / 2, point.z);
      contentGroup.add(mesh);
      _trackMesh(id, mesh);
      return mesh;
    }

    function addStructuralBeam(start, end, attrs = {}, id = null, matOverride = null) {
      const orientation = String(attrs.orientation || "").toLowerCase();
      const [, columnWidth] = parseDimensionPair(attrs.columnDimensions, 200, 200);
      const beamDepth = Math.max(0.08, (Number(attrs.depth) || 450) / 1000);
      const columnHeight = 2.8;
      const beamThickness = orientation === "vertical" ? columnWidth : beamDepth;
      const beamCenterY = columnHeight + beamDepth / 2;
      const color = matOverride ? matOverride.color.getHex() : 0xffd36a;
      const mat = matOverride
        ? matOverride
        : new THREE.MeshStandardMaterial({ color, roughness: 0.55 });
      const dir = new THREE.Vector3().subVectors(end, start);
      const length = dir.length();
      const angle = Math.atan2(dir.z, dir.x);
      const y = beamCenterY - beamDepth / 2;
      const geometry = new THREE.BoxGeometry(length, beamDepth, beamThickness);
      const mesh = new THREE.Mesh(geometry, mat);
      mesh.userData.elementId = id || "";
      mesh.userData.elInfo = {
        type: "beam",
        section: attrs.section || `${attrs.width || "?"}×${attrs.depth || "?"} mm`,
        material: attrs.material || "—",
        span: `${length.toFixed(2)} m`,
        orientation: attrs.orientation || "—",
      };
      mesh.rotation.y = -angle;
      mesh.position.set((start.x + end.x) / 2, y + beamDepth / 2, (start.z + end.z) / 2);
      contentGroup.add(mesh);
      _trackMesh(id, mesh);
      return mesh;
    }

    function addRoom(room, index) {
      const points = extractPoints(room);
      if (points.length < 3) return;
      addExtrudedPolygon(points, 0.07, materials.room, 0.025);
      addOutline(points, _isLight ? 0x3a6adf : 0xdbe8ff, 0.041);

      const area = room?.attributes?.area ?? polygonArea(closedPolygon(points));
      const centroid = points.slice(0, -1).reduce((acc, p) => acc.add(p.clone()), new THREE.Vector3()).multiplyScalar(1 / Math.max(1, points.length - 1));
      const text = `${room.name || room.id}\n${area.toFixed(1)} m²`;
      addLabel(text, centroid.x, 0.28, centroid.z, 0x7cb2ff);
    }

    function addLabel(text, x, y, z, color = 0xffffff) {
      const canvas = document.createElement("canvas");
      canvas.width = 384;
      canvas.height = 176;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = _isLight ? "rgba(255,255,255,0.88)" : "rgba(11, 16, 32, 0.78)";
      ctx.strokeStyle = _isLight ? "rgba(0,0,0,0.12)" : "rgba(255,255,255,0.10)";
      ctx.lineWidth = 4;
      roundRect(ctx, 14, 18, 356, 140, 20);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = `#${color.toString(16).padStart(6, "0")}`;
      ctx.font = "bold 24px Segoe UI";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const lines = String(text).split("\n");
      ctx.fillText(lines[0] ?? "", 192, 70);
      ctx.fillStyle = _isLight ? "#2a3a50" : "#e9eefc";
      ctx.font = "18px Segoe UI";
      ctx.fillText(lines[1] ?? "", 192, 112);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(2.4, 1.1, 1);
      sprite.position.set(x, y, z);
      contentGroup.add(sprite);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    // matOverrides: { [elementId]: THREE.Material } — overrides the default material per element
    function renderLayout(layout, matOverrides = null) {
      clearContent();

      const allPoints = [];
      const pushPoints = (pts) => pts.forEach((p) => allPoints.push(p.clone()));

      if (Array.isArray(layout.outline)) {
        const outlinePoints = layout.outline
          .filter((pt) => Array.isArray(pt) && pt.length >= 2)
          .map((pt) => new THREE.Vector3(Number(pt[0]), 0, -Number(pt[1])));
        if (outlinePoints.length >= 3) {
          addExtrudedPolygon(outlinePoints, 0.02, new THREE.MeshStandardMaterial({ color: _isLight ? 0xe8edf5 : 0x11172c, transparent: true, opacity: 0.9 }));
          addOutline(outlinePoints, _isLight ? 0x1a2540 : 0xffffff, 0.03);
          pushPoints(outlinePoints);
        }
      }

      for (const room of layout.rooms ?? []) {
        addRoom(room);
        pushPoints(extractPoints(room));
      }

      for (const furn of layout.furniture ?? []) {
        const points = extractPoints(furn);
        if (points.length >= 3) {
          addExtrudedPolygon(points, 0.06, materials.furniture, 0.03);
          addOutline(points, 0xe6d0ff, 0.09);
          pushPoints(points);
        }
      }

      for (const mep of layout.mep ?? []) {
        const points = extractPoints(mep);
        if (points.length >= 3) {
          addExtrudedPolygon(points, 0.08, materials.mep, 0.05);
          addOutline(points, 0xc8fff1, 0.12);
          pushPoints(points);
        }
      }

      for (const item of layout.structure ?? []) {
        const points = extractPoints(item);
        const attrs  = item.attributes ?? {};
        const type   = String(attrs.type || "").toLowerCase();
        const elId   = item.id || item.name || null;
        const matOvr = matOverrides ? (matOverrides[elId] || null) : null;

        if (type.includes("column") || points.length === 1) {
          if (points[0]) {
            addColumn(points[0], attrs, elId, matOvr);
            if (_showLabels && !matOvr) addLabel(item.name || item.id, points[0].x, 3.4, points[0].z, 0x7aabff);
            allPoints.push(points[0].clone());
          }
          continue;
        }

        if (points.length >= 2) {
          const [start, end] = extractLine(item) || [];
          if (!start || !end) continue;
          addStructuralBeam(start, end, attrs, elId, matOvr);
          const mid = new THREE.Vector3((start.x + end.x) / 2, 0, (start.z + end.z) / 2);
          if (_showLabels && !matOvr) addLabel(item.name || item.id, mid.x, 3.8, mid.z, 0xffd36a);
          pushPoints([start, end]);
        }
      }

      for (const door of layout.doors ?? []) {
        const line = extractLine(door);
        if (!line) continue;
        addSegment(line[0], line[1], 0xff8a7a, 0.06, 0.08, 0.04);
        pushPoints(line);
      }

      for (const win of layout.windows ?? []) {
        const line = extractLine(win);
        if (!line) continue;
        addSegment(line[0], line[1], 0x8ad4ff, 0.05, 0.05, 0.08);
        pushPoints(line);
      }

      if (allPoints.length) {
        const bounds = new THREE.Box3().setFromPoints(allPoints.map((p) => new THREE.Vector3(p.x, 0, p.z)));
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        bounds.getSize(size);
        bounds.getCenter(center);
        controls.target.set(center.x, 0, center.z);
        const radius = Math.max(size.x, size.z) * 0.75 + 6;
        camera.position.set(center.x + radius, Math.max(12, radius * 0.75), center.z + radius);
        controls.update();
      }
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${url}`);
      return res.json();
    }

    function applyHighlight(id) {
      if (!id || !elementMeshes[id]) return;
      for (const mesh of elementMeshes[id]) {
        mesh.material = materials.highlight;
      }
    }

    // Build a per-element material override map from before/after diff
    function buildCompareOverrides(beforeLayout, afterLayout) {
      const beforeIds = new Set((beforeLayout.structure ?? []).map((el) => el.id || el.name));
      const afterIds  = new Set((afterLayout.structure ?? []).map((el) => el.id || el.name));
      const overrides = {};
      for (const id of beforeIds) {
        if (!afterIds.has(id)) overrides[id] = materials.removed;
      }
      for (const id of afterIds) {
        if (!beforeIds.has(id)) overrides[id] = materials.added;
      }
      return overrides;
    }

    // Render removed elements (those only in beforeLayout) on top of the current scene
    function renderRemovedElements(beforeLayout, afterIds) {
      for (const item of beforeLayout.structure ?? []) {
        const elId = item.id || item.name || null;
        if (!elId || afterIds.has(elId)) continue; // skip unchanged; only render removed
        const points = extractPoints(item);
        if (points.length === 1 && points[0]) {
          addColumn(points[0], item.attributes ?? {}, elId, materials.removed);
        } else if (points.length >= 2) {
          const [start, end] = extractLine(item) || [];
          if (start && end) addStructuralBeam(start, end, item.attributes ?? {}, elId, materials.removed);
        }
      }
    }

    async function initScene() {
      const layoutUrl   = _optionFile ? `./${_optionFile}` : DEFAULT_LAYOUT_URL;
      const afterLayout = await fetchJson(layoutUrl);

      if (_compareMode) {
        let beforeLayout = null;
        try { beforeLayout = await fetchJson(BEFORE_LAYOUT_URL); } catch (_) {}

        if (beforeLayout) {
          const afterIds  = new Set((afterLayout.structure ?? []).map((el) => el.id || el.name));
          const overrides = buildCompareOverrides(beforeLayout, afterLayout);
          renderLayout(afterLayout, overrides);
          renderRemovedElements(beforeLayout, afterIds);
        } else {
          renderLayout(afterLayout);
        }
      } else {
        renderLayout(afterLayout);
      }

      // Apply highlight after all elements are in the scene
      if (_highlightId) applyHighlight(_highlightId);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Click-to-select: show popup with element info, relay ID to parent frame
    const _raycaster = new THREE.Raycaster();
    const _mouse     = new THREE.Vector2();
    const _popup     = document.getElementById("el-popup");

    renderer.domElement.addEventListener("click", function (e) {
      const rect = renderer.domElement.getBoundingClientRect();
      _mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      _mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
      _raycaster.setFromCamera(_mouse, camera);
      const allMeshes = [];
      Object.entries(elementMeshes).forEach(([, meshes]) => meshes.forEach(m => allMeshes.push(m)));
      const hits = _raycaster.intersectObjects(allMeshes, false);

      if (hits.length) {
        const mesh = hits[0].object;
        const eid  = mesh.userData.elementId || "";
        const info = mesh.userData.elInfo   || {};
        if (eid) {
          // Position popup near cursor, clamp to viewport
          const px = Math.min(e.clientX + 14, window.innerWidth  - 270);
          const py = Math.max(e.clientY - 16, 8);
          _popup.style.left    = `${px}px`;
          _popup.style.top     = `${py}px`;
          _popup.style.display = "block";
          document.getElementById("el-popup-id").textContent   = eid;
          document.getElementById("el-popup-type").textContent = info.type || "element";
          const propsHtml = Object.entries(info)
            .filter(([k]) => k !== "type")
            .map(([k, v]) => `<span style="color:#6ab8b8">${k}:</span> ${v}`)
            .join("<br>");
          document.getElementById("el-popup-props").innerHTML = propsHtml || "—";
          window.parent.postMessage({ type: "selectElement", elementId: eid }, "*");
        }
      } else {
        _popup.style.display = "none";
      }
    });

    document.getElementById("el-popup-close").addEventListener("click", function () {
      _popup.style.display = "none";
    });
    document.getElementById("el-popup-select").addEventListener("click", function () {
      const eid = document.getElementById("el-popup-id").textContent;
      if (eid) window.parent.postMessage({ type: "selectElement", elementId: eid }, "*");
      _popup.style.display = "none";
    });

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    initScene().catch((err) => console.error(err));
    animate();
  </script>
</body>
</html>
